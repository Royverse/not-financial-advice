name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project (Next.js + Netlify functions)
        run: npm run full-build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          XPOZ_API_KEY: ${{ secrets.XPOZ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Validate Secrets & Environment Setup
        uses: actions/github-script@v7
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XPOZ_API_KEY: ${{ secrets.XPOZ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          script: |
            const secrets = {
              NETLIFY_AUTH_TOKEN: process.env.NETLIFY_AUTH_TOKEN,
              NETLIFY_SITE_ID: process.env.NETLIFY_SITE_ID,
              SUPABASE_URL: process.env.SUPABASE_URL,
              GEMINI_API_KEY: process.env.GEMINI_API_KEY,
              XPOZ_API_KEY: process.env.XPOZ_API_KEY,
              OPENROUTER_API_KEY: process.env.OPENROUTER_API_KEY,
              GROQ_API_KEY: process.env.GROQ_API_KEY,
            };
            
            console.log('--- SECRET VALIDATION LOG ---');
            for (const [key, value] of Object.entries(secrets)) {
              if (!value) {
                core.error(`❌ ${key} is EMPTY or NOT SET in GitHub Secrets!`);
              } else {
                const isAuthToken = key === 'NETLIFY_AUTH_TOKEN';
                const startsCorrect = isAuthToken ? value.startsWith('nfp_') : true;
                
                let msg = `✅ ${key} is present (Length: ${value.length})`;
                if (isAuthToken && !startsCorrect) msg += ' ⚠️ DOES NOT START WITH nfp_! (Likely invalid)';
                
                console.log(msg);
              }
            }
            console.log('-----------------------------');

      - name: Deploy to Netlify (using CLI to prevent hangs)
        run: npx netlify-cli deploy --prod --dir=out --functions=netlify/functions-dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
