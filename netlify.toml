[build]
  command = "npm run build && npm run build:functions"
  publish = "out"

[functions]
  directory = "netlify/functions-dist"
  node_bundler = "esbuild"

# Explicit redirects for flattened functions

[[redirects]]
  from = "/api/cron/select-tickers"
  to = "/.netlify/functions/api-cron-select-tickers"
  status = 200
  force = true

[[redirects]]
  from = "/api/cron/validate-outcomes"
  to = "/.netlify/functions/api-cron-validate-outcomes"
  status = 200
